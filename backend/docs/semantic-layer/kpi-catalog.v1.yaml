defaults:
  health_ranges: &default_health_ranges
    excellent:
      min: 95
    good:
      min: 80
    attention:
      min: 60
    critical:
      min: 0
  presentation: &default_presentation
    title: Indicador Executivo
    subtitle: Indicador consolidado para acompanhamento executivo.
    empty_message: Sem dados consolidados para o periodo.
    tooltip: KPI oficial da plataforma.
    card_style: premium

kpis:
  FIN-01:
    id: FIN-01
    code: net_revenue
    name: Receita Liquida
    short_name: Receita
    description: Receita liquida consolidada do periodo.
    category: Financeiro
    subcategory: Receita
    unit: BRL
    display_format: currency_compact
    precision: 2
    icon: payments
    color: success
    display_order: 1
    formula_id: revenue.net
    formula: Receita bruta menos impostos, devolucoes e descontos.
    depends_on: []
    source_tables: [fact_sales]
    business_area: Financeiro
    health_ranges: *default_health_ranges
    trend_strategy: compare_previous_month
    presentation:
      title: Receita Liquida
      subtitle: Receita consolidada do periodo.
      empty_message: Sem receita consolidada para o periodo.
      tooltip: Receita liquida apos deducoes fiscais e comerciais.
      card_style: premium
    tags: [receita, vendas, executivo]
    owner: financeiro
    formula_spec:
      formula_id: f.net_revenue
      name: receita_liquida
      expression: sub(sub(sub(sum(gross_revenue), sum(tax_amount)), sum(return_amount)), sum(discount_amount))
      input_metrics: [fact_sales.gross_revenue, fact_sales.tax_amount, fact_sales.return_amount, fact_sales.discount_amount]
      output_type: decimal
      output_unit: BRL
      precision: 2
      owner: financeiro
      version: 1
      effective_from: 2026-07-10

  FIN-02:
    id: FIN-02
    code: ebitda_margin
    name: Margem EBITDA
    short_name: EBITDA
    description: Margem EBITDA consolidada do periodo.
    category: Financeiro
    subcategory: Rentabilidade
    unit: PERCENT
    display_format: percent_compact
    precision: 2
    icon: trending_up
    color: success
    display_order: 2
    formula_id: margin.ebitda
    formula: EBITDA dividido pela receita liquida.
    depends_on: [FIN-01]
    source_tables: [fact_sales, fact_finance_statement]
    business_area: Financeiro
    health_ranges: *default_health_ranges
    trend_strategy: compare_previous_month
    presentation:
      title: Margem EBITDA
      subtitle: Eficiência operacional antes de juros e impostos.
      empty_message: Sem margem EBITDA calculada para o periodo.
      tooltip: Percentual da receita que sobra da operacao.
      card_style: premium
    tags: [margem, ebitda, rentabilidade]
    owner: controladoria
    formula_spec:
      formula_id: f.ebitda_margin
      name: margem_ebitda
      expression: mul(div(sum(ebitda), sum(net_revenue)), 100)
      input_metrics: [fact_finance_statement.ebitda, revenue.net]
      output_type: decimal
      output_unit: percent
      precision: 2
      owner: controladoria
      version: 1
      effective_from: 2026-07-10

