metadata:
  artifact: kpi_catalog
  version: 1.0.0
  status: approved
  owner_roles:
    - principal_backend_engineer
    - data_architect
    - chief_business_intelligence_officer
  date: 2026-07-12
  source_of_truth: true

categories:
  - Financeiro
  - Economico
  - Comercial
  - Operacional
  - Produtividade
  - Estoque
  - Clientes
  - RH
  - Fiscal
