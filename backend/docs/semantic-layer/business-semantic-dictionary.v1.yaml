metadata:
  artifact: business_semantic_dictionary
  version: 1.0.0
  status: approved
  language: pt-BR
  authority: official_semantic_source

governance:
  ownership:
    business_owner: bi_office
    data_owner: data_architecture
    technical_owner: platform_architecture
  change_policy:
    approval_required_roles:
      - controller
      - cfo
      - principal_ddd_architect
    backward_compatibility: semantic_id_is_immutable

semantic_terms:
  - semantic_id: term.company_id
    domain: global
    name: company_id
    business_definition: unique tenant identifier for legal entity scope
    data_type: string
    cardinality: one_per_record
    pii_classification: none
    usage_rules:
      - mandatory_in_all_business_facts
      - used_for_security_partitioning
      - must_match_auth_principal_scope

  - semantic_id: term.period_ref
    domain: global
    name: period_ref
    business_definition: time grain reference for aggregation and KPI windows
    data_type: string
    examples:
      - 2026-07-10
      - 2026-W28
      - 2026-07
    usage_rules:
      - time_grain_must_be_explicit
      - no_metric_without_period_ref

  - semantic_id: term.gross_revenue
    domain: financeiro
    name: receita_bruta
    business_definition: total invoiced amount before deductions
    data_type: decimal
    unit: BRL
    aggregation: sum

  - semantic_id: term.net_revenue
    domain: financeiro
    name: receita_liquida
    business_definition: gross revenue minus taxes, returns, and granted discounts
    data_type: decimal
    unit: BRL
    aggregation: sum

  - semantic_id: term.ebitda
    domain: financeiro
    name: ebitda
    business_definition: earnings before interest, taxes, depreciation, and amortization
    data_type: decimal
    unit: BRL
    aggregation: sum

  - semantic_id: term.operating_cash_flow
    domain: financeiro
    name: fluxo_caixa_operacional
    business_definition: net cash generated by operating activities
    data_type: decimal
    unit: BRL
    aggregation: sum

  - semantic_id: term.sales_opportunity
    domain: comercial
    name: oportunidade_qualificada
    business_definition: sales opportunity accepted by qualification criteria
    data_type: integer
    aggregation: sum

  - semantic_id: term.sales_closed
    domain: comercial
    name: vendas_fechadas
    business_definition: opportunities converted to confirmed sales
    data_type: integer
    aggregation: sum

  - semantic_id: term.customer_acquisition_cost
    domain: comercial
    name: cac
    business_definition: acquisition spend divided by number of new customers
    data_type: decimal
    unit: BRL
    aggregation: weighted_average

  - semantic_id: term.inventory_on_hand
    domain: estoque
    name: estoque_disponivel
    business_definition: quantity physically and systemically available for sale or use
    data_type: decimal
    unit: quantity
    aggregation: last_snapshot

  - semantic_id: term.stockout_rate
    domain: estoque
    name: taxa_ruptura
    business_definition: proportion of demanded skus with unavailable stock
    data_type: decimal
    unit: percent
    aggregation: average

  - semantic_id: term.procurement_lead_time_days
    domain: compras
    name: lead_time_suprimento_dias
    business_definition: elapsed days between purchase order issue and receipt
    data_type: decimal
    unit: days
    aggregation: average

  - semantic_id: term.turnover_rate
    domain: rh
    name: turnover
    business_definition: employee replacement rate in a period
    data_type: decimal
    unit: percent
    aggregation: average

  - semantic_id: term.first_response_time_minutes
    domain: atendimento
    name: tempo_primeira_resposta
    business_definition: elapsed minutes until first customer response
    data_type: decimal
    unit: minutes
    aggregation: average

  - semantic_id: term.oee
    domain: producao
    name: oee
    business_definition: overall equipment effectiveness combining availability, performance, quality
    data_type: decimal
    unit: percent
    aggregation: average

  - semantic_id: term.business_health_index
    domain: executivo
    name: business_health_index
    business_definition: composite strategic health score from weighted critical KPIs
    data_type: decimal
    unit: score_0_100
    aggregation: weighted_average

controlled_vocabularies:
  status_health:
    allowed_values:
      - green
      - yellow
      - red
  severity_level:
    allowed_values:
      - low
      - medium
      - high
      - critical
  priority_level:
    allowed_values:
      - p0
      - p1
      - p2
      - p3

semantic_quality_rules:
  - rule_id: semq.001
    description: each KPI formula must reference only known semantic_ids
  - rule_id: semq.002
    description: any ERP mapping field must resolve to one canonical semantic_id
  - rule_id: semq.003
    description: AI prompt contracts must reject undefined vocabulary values
