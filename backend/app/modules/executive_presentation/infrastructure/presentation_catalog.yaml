severity:
  CRITICAL:
    label: Critica
    color: error
    icon: warning
  HIGH:
    label: Alta
    color: error
    icon: warning
  MEDIUM:
    label: Media
    color: warning
    icon: warning
  LOW:
    label: Baixa
    color: info
    icon: info
  INFO:
    label: Informativa
    color: info
    icon: info

health:
  good:
    label: Saudavel
    color: success
    icon: check_circle
    description: Indicador dentro da faixa esperada.
  attention:
    label: Em atencao
    color: warning
    icon: warning
    description: Indicador com variacao relevante e acompanhamento recomendado.
  critical:
    label: Critico
    color: error
    icon: error
    description: Indicador fora da faixa esperada e exige acao imediata.

score:
  thresholds:
    - min: 95
      status: Excelente
      color: success
      icon: workspace_premium
      description: Sua empresa apresenta excelente desempenho financeiro e operacional.
    - min: 80
      status: Muito Boa
      color: success
      icon: verified
      description: Sua empresa apresenta desempenho consistente com alta confiabilidade operacional.
    - min: 65
      status: Boa
      color: info
      icon: sentiment_satisfied
      description: Sua empresa tem boa performance, com oportunidades objetivas de evolucao.
    - min: 50
      status: Atencao
      color: warning
      icon: warning
      description: Sua empresa requer atencao em indicadores-chave para manter ritmo de crescimento.
    - min: 35
      status: Critica
      color: error
      icon: report_problem
      description: Sua empresa apresenta riscos relevantes que exigem plano de resposta imediato.
    - min: 0
      status: Grave
      color: error
      icon: error
      description: Sua empresa esta em nivel critico e precisa de intervencao executiva imediata.

kpis:
  FIN-01:
    short_name: Receita
    display_name: Receita Liquida
    description: Total de receita liquida consolidada no periodo.
    icon: payments
    category: Financeiro
    currency: BRL
    health:
      green: good
      yellow: attention
      red: critical
    comparison: em relacao ao mes anterior
    display_order: 1
  FIN-02:
    short_name: Margem
    display_name: Margem EBITDA
    description: Percentual de margem EBITDA no periodo.
    icon: trending_up
    category: Financeiro
    currency: PERCENT
    comparison: em relacao ao mes anterior
    display_order: 2
  FIN-03:
    short_name: Margem Op.
    display_name: Margem Operacional
    description: Margem operacional consolidada no periodo.
    icon: account_balance_wallet
    category: Financeiro
    currency: PERCENT
    comparison: em relacao ao mes anterior
    display_order: 3
  COM-01:
    short_name: Vendas
    display_name: Vendas
    description: Volume de vendas liquidas no periodo.
    icon: shopping_cart
    category: Comercial
    currency: BRL
    comparison: em relacao ao mes anterior
    display_order: 4
  EST-01:
    short_name: Estoque
    display_name: Nivel de Estoque
    description: Cobertura de estoque consolidada no periodo.
    icon: inventory
    category: Operacional
    currency: NUMBER
    comparison: em relacao ao mes anterior
    display_order: 5
  EXE-04:
    short_name: Saude
    display_name: Indice de Saude do Negocio
    description: Composto executivo que resume a saude da empresa.
    icon: monitor_heart
    category: Executivo
    currency: SCORE
    comparison: em relacao ao mes anterior
    display_order: 6
  default:
    short_name: Indicador
    display_name: Indicador
    description: Indicador consolidado para acompanhamento executivo.
    icon: insights
    category: Executivo
    currency: NUMBER
    comparison: em relacao ao mes anterior
    display_order: 99

alerts:
  by_rule:
    r.fin01.net_revenue_below_target:
      title: Receita abaixo da meta
      message: A receita liquida ficou abaixo da meta definida para este periodo.
      category: Financeiro
      icon: payments
      color: warning
  by_kpi:
    FIN-01:
      title: Receita abaixo da meta
      message: A receita liquida ficou abaixo da meta definida para este periodo.
      category: Financeiro
      icon: payments
      color: warning
    FIN-02:
      title: Fluxo de caixa negativo
      message: O fluxo de caixa apresenta saldo negativo no periodo e requer ajuste imediato.
      category: Financeiro
      icon: account_balance
      color: error
    FIN-03:
      title: Margem operacional reduzida
      message: A margem operacional ficou abaixo do patamar esperado para este periodo.
      category: Financeiro
      icon: show_chart
      color: warning
    COM-01:
      title: Queda nas vendas
      message: O desempenho comercial ficou abaixo da tendencia projetada para o periodo.
      category: Comercial
      icon: trending_down
      color: warning
    EST-01:
      title: Estoque elevado
      message: O nivel de estoque acima do previsto aumenta risco de capital parado.
      category: Operacional
      icon: inventory_2
      color: info
  default:
    title_template: "{kpi_name} com desvio relevante"
    message_template: "O indicador {kpi_name} apresentou variacao fora do esperado para este periodo."
    category: Executivo
    icon: warning
    color: warning

