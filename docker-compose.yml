services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: bi_api
    env_file:
      - ./backend/.env.docker
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend/app:/app/app
      - ./backend/docs:/app/docs
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()\" || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - bi_public
      - bi_internal

  postgres:
    image: postgres:16-alpine
    container_name: bi_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bi"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped
    networks:
      - bi_internal

  redis:
    image: redis:7-alpine
    container_name: bi_redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 5s
    restart: unless-stopped
    networks:
      - bi_internal

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: bi_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bi.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:80/misc/ping', timeout=5).read()\" || exit 1",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - bi_public
      - bi_internal

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: bi_migrate
    env_file:
      - ./backend/.env.docker
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["tools"]
    networks:
      - bi_internal

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  bi_public:
    driver: bridge
  bi_internal:
    driver: bridge
    internal: true
